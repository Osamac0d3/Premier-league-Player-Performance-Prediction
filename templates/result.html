<!DOCTYPE html>
<html>

<head>

<title>Top Players</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container2">

<h1>⚽ Top Predicted Performing Players</h1>

<h2>{{team}} vs {{opponent}}</h2>

<table>

<tr>
<th>Rank</th>
<th>Player Name</th>
<th>Team</th>
</tr>

{% for player in players %}

<tr>

<td>{{loop.index}}</td>
<td>{{player.player_name}}</td>
<td>{{player.team}}</td>

</tr>

{% endfor %}

</table>

<br><br>

<h2>📊 Player Statistics Visualization</h2>

<canvas id="goalsChart"></canvas>

<br><br>

<canvas id="assistsChart"></canvas>

<br><br>

<canvas id="minutesChart"></canvas>

<a href="/" class="btn">⬅ Back</a>

</div>

<script>

const players = {{ players | tojson }};

const names = players.map(p => p.player_name);
const goals = players.map(p => p.goals);
const assists = players.map(p => p.assists);
const minutes = players.map(p => p.minutes_played);


new Chart(document.getElementById("goalsChart"), {
type: "bar",
data: {
labels: names,
datasets: [{
label: "Goals",
data: goals
}]
}
});


new Chart(document.getElementById("assistsChart"), {
type: "bar",
data: {
labels: names,
datasets: [{
label: "Assists",
data: assists
}]
}
});


new Chart(document.getElementById("minutesChart"), {
type: "line",
data: {
labels: names,
datasets: [{
label: "Minutes Played",
data: minutes
}]
}
});

</script>

</body>
</html>
